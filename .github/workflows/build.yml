name: Build or Pack Mod
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: Process and Compile Code
      run: |
        # 1. Tai bo khung dich Fabric 1.21.1 tu trang chu
        git clone --depth 1 --branch 1.21.1 https://github.com/FabricMC/fabric-example-mod.git template
        
        # Xoa cac file mau cua template di
        rm -rf template/src/main/java/*
        rm -rf template/src/main/resources/*
        
        # 2. Tu dong gom code (Ke ca dang zip hay dang thu muc thong thuong)
        mkdir -p extracted
        if ls *.zip 1> /dev/null 2>&1; then
          echo "Phat hien file zip, dang giai nen..."
          unzip -q "*.zip" -d extracted
        else
          echo "Phat hien code thong thuong, dang copy vao he thong..."
          for item in *; do
            if [ "$item" != "template" ] && [ "$item" != "extracted" ] && [ "$item" != "output_jar" ]; then
              cp -r "$item" extracted/ 2>/dev/null || true
            fi
          done
        fi
        
        # 3. Tim vi tri file cau hinh de xac dinh goc cua mod
        MOD_ROOT=$(find extracted -name "fabric.mod.json" -exec dirname {} \; | head -n 1)
        if [ -z "$MOD_ROOT" ]; then
          MOD_ROOT="extracted"
        fi
        
        # 4. Dua code vao vi tri tam thoi de xu ly
        HAS_SRC_DIR=$(find "$MOD_ROOT" -path "*/src/main/java" -type d | head -n 1)
        if [ -n "$HAS_SRC_DIR" ]; then
          SRC_BASE=$(echo "$HAS_SRC_DIR" | sed 's|/src/main/java||')
          cp -r "$SRC_BASE"/src/main/java/* template/src/main/java/ 2>/dev/null || true
          cp -r "$SRC_BASE"/src/main/resources/* template/src/main/resources/ 2>/dev/null || true
        else
          cp -r "$MOD_ROOT"/* template/src/main/java/ 2>/dev/null || true
          cp -r "$MOD_ROOT"/* template/src/main/resources/ 2>/dev/null || true
          find template/src/main/java/ -type f ! -name "*.java" -delete 2>/dev/null || true
          find template/src/main/resources/ -name "*.java" -delete 2>/dev/null || true
        fi
        
        # 5. Khởi chạy Trình dọn dẹp và Tự động sắp xếp lại cấu trúc thư mục Java chuẩn 100%
        cat << 'EOF' > organize.py
        import os
        import re
        import glob
        import json
        import shutil

        # --- 5.1 Sửa lỗi file mixin cấu hình game ---
        for fpath in glob.glob('template/src/main/resources/**/chemss.mixins.json', recursive=True):
            try:
                with open(fpath, 'r') as f: data = json.load(f)
                if 'mixins' in data and isinstance(data['mixins'], list):
                    data['mixins'] = [m for m in data['mixins'] if 'KeyboardMixin' not in m]
                if 'client' in data and isinstance(data['client'], list):
                    data['client'] = [m for m in data['client'] if 'KeyboardMixin' not in m]
                with open(fpath, 'w') as f: json.dump(data, f, indent=2)
                print(f"Da va xong mixin: {fpath}")
            except Exception as e:
                print(f"Loi mixin {fpath}: {e}")

        # --- 5.2 Quét và tự động đưa các file Java về đúng thư mục package ---
        os.makedirs('temp_java', exist_ok=True)
        java_files = glob.glob('template/src/main/java/**/*.java', recursive=True)

        for fpath in java_files:
            if os.path.isfile(fpath):
                filename = os.path.basename(fpath)
                
                # Đọc nội dung file
                with open(fpath, 'r', encoding='utf-8', errors='ignore') as f:
                    content = f.read()
                
                # Nếu phát hiện file ModuleManager.java, lập tức thay thế bằng bản code sạch hoàn hảo nhất
                if filename == 'ModuleManager.java':
                    content = """package me.chemss.modules;

import java.util.ArrayList;
import java.util.List;
import me.chemss.modules.movement.Sprint;
import me.chemss.modules.combat.DoubleAnchor;

public class ModuleManager {
    private final List<Module> modules = new ArrayList<>();

    public ModuleManager() {
        modules.add(new Sprint());       
        modules.add(new DoubleAnchor()); 
    }

    public List<Module> getModules() {
        return modules;
    }

    public Module getModuleByName(String name) {
        for (Module m : modules) {
            if (m.getName().equalsIgnoreCase(name)) {
                return m;
            }
        }
        return null;
    }
}"""
                
                # Sửa lỗi viết hoa sai chính tả chữ 'Package' thành 'package'
                content = re.sub(r'^[Pp]ackage\s+', 'package ', content, flags=re.MULTILINE)
                
                # Đọc dòng khai báo package bên trong file để tìm vị trí đặt thư mục đúng
                match = re.search(r'package\s+([\w\.]+)\s*;', content)
                if match:
                    pkg_name = match.group(1).strip()
                else:
                    pkg_name = "me.chemss.modules"
                    content = "package me.chemss.modules;\n" + content
                
                # Tạo đường dẫn thư mục chuẩn dựa trên tên package
                pkg_dir = os.path.join('temp_java', pkg_name.replace('.', '/'))
                os.makedirs(pkg_dir, exist_ok=True)
                
                # Di chuyển file vào thư mục cấu trúc mới sạch sẽ
                dest_file = os.path.join(pkg_dir, filename)
                with open(dest_file, 'w', encoding='utf-8') as f:
                    f.write(content)

        # Xóa bỏ thư mục java cũ bị lộn xộn cấu trúc đi
        if os.path.exists('template/src/main/java'):
            shutil.rmtree('template/src/main/java')
        os.makedirs('template/src/main/java', exist_ok=True)

        # Đưa toàn bộ cấu thư mục chuẩn đã sắp xếp vào hệ thống chính thức
        if os.path.exists('temp_java') and os.listdir('temp_java'):
            for item in os.listdir('temp_java'):
                shutil.move(os.path.join('temp_java', item), 'template/src/main/java/')
            print("Chúc mừng! Đã sắp xếp lại toàn bộ cấu trúc file Java khớp với Package thành công!")
        else:
            print("Không tìm thấy file Java nào!")
            
        if os.path.exists('temp_java'):
            shutil.rmtree('temp_java')
        EOF
        
        # Chạy công cụ tự động xếp hàng file
        python3 organize.py
        
        # 6. Chay may dich tu file .java sang file .class chuẩn Minecraft
        cd template
        chmod +x gradlew
        ./gradlew build
        cd ..
        
        # 7. Gom thanh qua file .jar ra ngoai
        mkdir -p output_jar
        find template/build/libs/ -type f -name "*.jar" ! -name "*-sources.jar" ! -name "*-dev.jar" ! -name "*-sources-dev.jar" -exec cp {} output_jar/ShibaClient.jar \;

    - name: Upload Result
      uses: actions/upload-artifact@v4
      with:
        name: ShibaClient-Jar
        path: output_jar/
