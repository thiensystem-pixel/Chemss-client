name: Build or Pack Mod
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: Process and Compile Code
      run: |
        # 1. Tu dong tai bo khung dich Fabric 1.21.1 chuan tu trang chu
        git clone --depth 1 --branch 1.21.1 https://github.com/FabricMC/fabric-example-mod.git template
        
        # 2. Xoa cac file mau cua template di
        rm -rf template/src/main/java/*
        rm -rf template/src/main/resources/*
        
        # 3. Giai nen file zip cua ban
        mkdir extracted
        unzip -q "*.zip" -d extracted
        
        # 4. Kiem tra cau truc va dua code cua ban vao bo dich
        SRC_JAVA_DIR=$(find extracted -name "java" -type d | grep "src/main/java" | head -n 1)
        SRC_RES_DIR=$(find extracted -name "resources" -type d | grep "src/main/resources" | head -n 1)
        
        if [ -n "$SRC_JAVA_DIR" ] && [ -n "$SRC_RES_DIR" ]; then
          echo "Phat hien cau truc tieu chuan src/main/java"
          cp -r "$SRC_JAVA_DIR"/* template/src/main/java/
          cp -r "$SRC_RES_DIR"/* template/src/main/resources/
        else
          echo "Phat hien cau truc phang"
          FABRIC_JSON=$(find extracted -name "fabric.mod.json" | head -n 1)
          MOD_ROOT=$(dirname "$FABRIC_JSON")
          cp -r "$MOD_ROOT"/* template/src/main/java/
          cp -r "$MOD_ROOT"/* template/src/main/resources/
          find template/src/main/resources/ -name "*.java" -delete
        fi
        
        # 5. Tu dong xoa dong loi KeyboardMixin trong file cau hinh
        python3 -c "
        import json, glob
        for fpath in glob.glob('template/src/main/resources/**/chemss.mixins.json', recursive=True):
            with open(fpath, 'r') as f: data = json.load(f)
            if 'mixins' in data and isinstance(data['mixins'], list):
                data['mixins'] = [m for m in data['mixins'] if 'KeyboardMixin' not in m]
            if 'client' in data and isinstance(data['client'], list):
                data['client'] = [m for m in data['client'] if 'KeyboardMixin' not in m]
            with open(fpath, 'w') as f: json.dump(data, f, indent=2)
        print('Da tu dong sua xong loi KeyboardMixin!')
        "
        
        # 6. Tien hanh chay may dich sang duoi .class
        cd template
        chmod +x gradlew
        ./gradlew build
        cd ..
        
        # 7. Gom file .jar da duoc dich thanh cong ra ngoai
        mkdir -p output_jar
        find template/build/libs/ -type f -name "*.jar" ! -name "*-sources.jar" ! -name "*-dev.jar" ! -name "*-sources-dev.jar" -exec cp {} output_jar/ShibaClient.jar \;

    - name: Upload Result
      uses: actions/upload-artifact@v4
      with:
        name: ShibaClient-Jar
        path: output_jar/
