name: Build or Pack Mod
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: Process Code
      run: |
        mkdir extracted
        unzip -q "*.zip" -d extracted
        
        # May chu se tu dong vao tim va xoa dong loi cho ban
        python3 -c "
        import json, glob
        for fpath in glob.glob('extracted/**/chemss.mixins.json', recursive=True):
            with open(fpath, 'r') as f: data = json.load(f)
            if 'mixins' in data and isinstance(data['mixins'], list):
                data['mixins'] = [m for m in data['mixins'] if 'KeyboardMixin' not in m]
            if 'client' in data and isinstance(data['client'], list):
                data['client'] = [m for m in data['client'] if 'KeyboardMixin' not in m]
            with open(fpath, 'w') as f: json.dump(data, f, indent=2)
        print('Da tu dong sua xong loi KeyboardMixin!')
        "
        
        BUILD_PATH=$(find extracted -name "build.gradle" | head -n 1)
        mkdir -p output_jar
        
        if [ -n "$BUILD_PATH" ]; then
          echo "Phat hien ma nguon Gradle. Bat dau bien dich..."
          BUILD_DIR=$(dirname "$BUILD_PATH")
          cp -r "$BUILD_DIR"/* .
          chmod +x gradlew
          ./gradlew build
          cp build/libs/*.jar output_jar/
        else
          echo "Khong co build.gradle. Day la mod da lam san, tien hanh dong goi..."
          cd extracted
          FIRST_ITEM=$(ls -A)
          ITEM_COUNT=$(echo "$FIRST_ITEM" | wc -l)
          if [ "$ITEM_COUNT" -eq 1 ] && [ -d "$FIRST_ITEM" ]; then
            cd "$FIRST_ITEM"
          fi
          zip -r ../../output_jar/ShibaClient.jar ./*
          cd ../..
        fi

    - name: Upload Result
      uses: actions/upload-artifact@v4
      with:
        name: ShibaClient-Jar
        path: output_jar/
